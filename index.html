<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Filojogando - Filosofia da Educação</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  background: radial-gradient(circle, #0d1b2a, #000);
  color: white;
  margin: 0;
}

/* CABEÇALHO */
header {
  position: fixed;
  top: 0;
  width: 100%;
  background: #000814;
  color: gold;
  padding: 10px;
  font-weight: bold;
}

/* RODAPÉ */
footer {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: #000814;
  color: #ccc;
  padding: 8px;
  font-size: 14px;
}

/* CONTEÚDO */
main {
  margin-top: 70px;
  margin-bottom: 60px;
}

h1 { color: gold; }

#placar {
  display: flex;
  justify-content: center;
  gap: 40px;
  font-size: 22px;
}

.lado {
  padding: 10px 20px;
  border-radius: 10px;
  background: #1b263b;
}

.ativo {
  border: 2px solid gold;
}

#turno { font-size: 20px; margin-top: 10px; }
#timer { font-size: 18px; color: #00d4ff; }

#roleta {
  width: 200px;
  height: 200px;
  border-radius: 50%;
  border: 10px solid gold;
  margin: 20px auto;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 40px;
  transition: transform 2s ease-out;
  background: #1b263b;
}

button {
  padding: 15px;
  font-size: 18px;
  background: gold;
  border: none;
  border-radius: 10px;
  cursor: pointer;
}

.opcao {
  margin: 10px auto;
  padding: 12px;
  width: 60%;
  background: #1b263b;
  border-radius: 10px;
  cursor: pointer;
}

.opcao:hover { background: #415a77; }

.correta { background: green !important; }
.errada { background: red !important; }
.desativado { pointer-events: none; opacity: 0.5; }

/* TELA FINAL */
#final {
  display: none;
  position: fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background: rgba(0,0,0,0.95);
  color: gold;
  font-size: 30px;
  align-items: center;
  justify-content: center;
  flex-direction: column;
}
</style>
</head>

  },
  {

    ],

  {

      "Repetir ideias"

];

// CONFIG
let numerosDisponiveis = Array.from({ length: 50 }, (_, i) => i);
let ladoAtual = "A";
let pontosA = 0;
let pontosB = 0;
let tempo = 15;
let intervalo;
let podeGirar = true;

// ELEMENTOS
const ladoAEl = document.getElementById("ladoA");
const ladoBEl = document.getElementById("ladoB");
const turnoEl = document.getElementById("turno");
const timerEl = document.getElementById("timer");

// FUNÇÕES
function atualizarPlacar() {
  ladoAEl.innerText = "Lado A: " + pontosA;
  ladoBEl.innerText = "Lado B: " + pontosB;

  ladoAEl.classList.toggle("ativo", ladoAtual === "A");
  ladoBEl.classList.toggle("ativo", ladoAtual === "B");
}

function alternarLado() {
  ladoAtual = ladoAtual === "A" ? "B" : "A";
  turnoEl.innerText = "👉 Vez do Lado " + ladoAtual;
  atualizarPlacar();
}

function iniciarTimer() {
  clearInterval(intervalo);
  tempo = 15;

  timerEl.innerText = "⏱️ Tempo: " + tempo;

  intervalo = setInterval(() => {
    tempo--;
    timerEl.innerText = "⏱️ Tempo: " + tempo;

    if (tempo <= 0) {
      clearInterval(intervalo);
      bloquearRespostas();
      alert("⏰ Tempo esgotado!");
      alternarLado();
    }
  }, 1000);
}

function bloquearRespostas() {
  document.querySelectorAll(".opcao").forEach(op => {
    op.classList.add("desativado");
  });
}

function girarRoleta() {
  if (!podeGirar) return;
  podeGirar = false;

  if (numerosDisponiveis.length === 0) {
    finalizarJogo();
    return;
  }

  const roleta = document.getElementById("roleta");

  let rotacao = 360 * 5 + Math.random() * 360;
  roleta.style.transform = `rotate(${rotacao}deg)`;

  setTimeout(() => {
    const i = Math.floor(Math.random() * numerosDisponiveis.length);
    const numero = numerosDisponiveis.splice(i,1)[0];

    document.getElementById("numero").innerText = "🎯 Número: " + (numero + 1);

    mostrarPergunta(numero);
    iniciarTimer();

    podeGirar = true;
  }, 2000);
}

function mostrarPergunta(index) {
  if (!perguntas[index]) {
    alert("⚠️ Você ainda não colocou as perguntas!");
    return;
  }

  const q = perguntas[index];

  document.getElementById("pergunta").innerText = q.pergunta;

  const opcoesDiv = document.getElementById("opcoes");
  opcoesDiv.innerHTML = "";

  q.opcoes.forEach((op, i) => {
    const btn = document.createElement("div");
    btn.className = "opcao";
    btn.innerText = op;

    btn.onclick = () => verificarResposta(btn, i, q.correta);

    opcoesDiv.appendChild(btn);
  });
}

function verificarResposta(el, sel, cor) {
  clearInterval(intervalo);

  document.querySelectorAll(".opcao").forEach((op, i) => {
    if (i === cor) op.classList.add("correta");
  });

  if (sel === cor) {
    el.classList.add("correta");
    document.getElementById("somAcerto").play();
    ladoAtual === "A" ? pontosA++ : pontosB++;
  } else {
    el.classList.add("errada");
    document.getElementById("somErro").play();
  }

  bloquearRespostas();
  atualizarPlacar();

  setTimeout(alternarLado, 2000);
}

function finalizarJogo() {
  let texto = "";

  if (pontosA > pontosB) texto = "🏆 Lado A venceu!";
  else if (pontosB > pontosA) texto = "🏆 Lado B venceu!";
  else texto = "🤝 Empate!";

  const final = document.getElementById("final");
  final.style.display = "flex";
  final.innerHTML = texto + "<br><br>🎉 Parabéns!";

  document.getElementById("somVitoria").play();
}

// iniciar
atualizarPlacar();

</script>
