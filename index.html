// CONFIG
let lado="A",pA=0,pB=0,tempo=15,int,nums=[...Array(50).keys()];

// UI
function atualizar(){
ladoA.innerText="A: "+pA;
ladoB.innerText="B: "+pB;
turno.innerText="Vez do "+lado;
ladoA.classList.toggle("ativo",lado==="A");
ladoB.classList.toggle("ativo",lado==="B");
}

// TIMER
function timerStart(){
clearInterval(int);
tempo=15;
int=setInterval(()=>{
tempo--;
timer.innerText="Tempo: "+tempo;
tempoAudio.play();
if(tempo<=0){
clearInterval(int);
fim.play();
trocar();
}
},1000);
}

// GIRAR
function girar(){
click.play();

let r=360*8+Math.random()*360;
roleta.style.transform=`rotate(${r}deg)`;

setTimeout(()=>{
let i=Math.floor(Math.random()*nums.length);
let n=nums.splice(i,1)[0];
mostrar(n);
timerStart();
},3000);
}

// PERGUNTA
function mostrar(i){
if(!perguntas[i]) return alert("Sem perguntas");

pergunta.innerText=perguntas[i].pergunta;
opcoes.innerHTML="";

perguntas[i].opcoes.forEach((o,idx)=>{
let d=document.createElement("div");
d.className="opcao";
d.innerText=o;
d.onclick=()=>responder(idx,i);
opcoes.appendChild(d);
});
}

// RESPOSTA
function responder(sel,i){
clearInterval(int);
let c=perguntas[i].correta;

document.querySelectorAll(".opcao").forEach((o,idx)=>{
if(idx===c)o.classList.add("correta");
});

if(sel===c){
acerto.play();
lado==="A"?pA++:pB++;
}else{
erro.play();
}

salvar();
atualizar();
setTimeout(trocar,2000);
}

// TROCAR LADO
function trocar(){
lado=lado==="A"?"B":"A";
atualizar();
}

// SALVAR RANKING
function salvar(){
let dados=JSON.parse(localStorage.getItem("ranking")||"[]");
dados.push({A:pA,B:pB,data:new Date().toLocaleString()});
localStorage.setItem("ranking",JSON.stringify(dados));
mostrarRanking();
}

// MOSTRAR RANKING
function mostrarRanking(){
let dados=JSON.parse(localStorage.getItem("ranking")||"[]");
ranking.innerHTML="<h3>Ranking</h3>"+dados.map(d=>`A:${d.A} B:${d.B}`).join("<br>");
}

atualizar();
mostrarRanking();

</script>
